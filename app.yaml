command: ["npm", "run", "start"]

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "8000"
  - name: DATABRICKS_HOST
    valueFrom: databricks_host
  - name: MAS_ENDPOINT_NAME
    valueFrom: mas_endpoint_name
  - name: GENIE_SPACES_JSON
    valueFrom: genie_spaces_json
  - name: LAKEBASE_HOST
    valueFrom: lakebase_host
  - name: LAKEBASE_DATABASE
    valueFrom: lakebase_database
  - name: LAKEBASE_USER
    valueFrom: lakebase_user
  - name: LAKEBASE_PASSWORD
    valueFrom: lakebase_password
  - name: GENIE_FEEDBACK_PATH
    valueFrom: genie_feedback_path
