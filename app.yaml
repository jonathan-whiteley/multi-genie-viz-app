command: ["npm", "run", "start"]
runtime: nodejs20

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "8000"
  - name: MAS_ENDPOINT_NAME
    valueFrom: mas-endpoint
  - name: GENIE_SPACES_JSON
    value: '[{"space_id":"01f0aae3f2a812ceb9f489fa0317532a","label":"LCE Sales TXN","tags":["sales","revenue"],"tool_name":"lce-sales-txn-genie","suggested_questions":["What were Q1 revenues?","Show top SKUs this month"]}]'
  # DATABRICKS_HOST is auto-injected by the Databricks Apps platform.
  # PGHOST, PGDATABASE, PGUSER, PGPASSWORD, PGSSLMODE are auto-injected
  # by the 'database' resource binding -- no explicit valueFrom needed.
